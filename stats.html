<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thống kê - Finance AI</title>

  <link rel="icon" href="data:," />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="/css/style.css" />
</head>

<body class="bg-slate-50 text-slate-900">
  <script src="/env.js"></script>

  <div id="statsPage" class="max-w-6xl mx-auto p-4 md:p-8">
    <header class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-8">
      <div>
        <h1 class="text-3xl md:text-4xl font-black">Thống kê chi tiêu</h1>
        <p class="text-slate-500 text-sm mt-1">Lịch sử theo tháng, năm và danh mục</p>
      </div>

      <div class="flex gap-3">
        <a href="/index.html" class="px-5 py-3 rounded-2xl bg-white border border-slate-200 font-bold">Trang chủ</a>
        <button onclick="logout()" class="px-5 py-3 rounded-2xl bg-rose-500 text-white font-bold">Đăng xuất</button>
      </div>
    </header>

    <section class="bg-white rounded-[2rem] md:rounded-[3rem] p-6 md:p-8 shadow-sm border border-slate-100 mb-6">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="bg-slate-50 rounded-2xl p-4">
          <p class="text-[10px] uppercase tracking-widest text-slate-400 font-black">Tổng chi</p>
          <h2 id="statsTotal" class="text-2xl font-black mt-1">0đ</h2>
        </div>
        <div class="bg-slate-50 rounded-2xl p-4">
          <p class="text-[10px] uppercase tracking-widest text-slate-400 font-black">Số giao dịch</p>
          <h2 id="statsCount" class="text-2xl font-black mt-1">0</h2>
        </div>
        <div class="bg-slate-50 rounded-2xl p-4">
          <p class="text-[10px] uppercase tracking-widest text-slate-400 font-black">Trung bình/giao dịch</p>
          <h2 id="statsAverage" class="text-2xl font-black mt-1">0đ</h2>
        </div>
      </div>
    </section>

    <section class="bg-white rounded-[2rem] md:rounded-[3rem] p-6 md:p-8 shadow-sm border border-slate-100 mb-6">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="text-sm font-bold text-slate-600">Năm</label>
          <select id="yearFilter" class="w-full mt-2 p-4 rounded-2xl bg-slate-50 border border-slate-100 outline-none"></select>
        </div>
        <div>
          <label class="text-sm font-bold text-slate-600">Tháng</label>
          <select id="monthFilter" class="w-full mt-2 p-4 rounded-2xl bg-slate-50 border border-slate-100 outline-none"></select>
        </div>
      </div>
    </section>

    <section class="grid grid-cols-1 xl:grid-cols-2 gap-6 mb-6">
      <div class="bg-white rounded-[2rem] md:rounded-[3rem] p-6 md:p-8 shadow-sm border border-slate-100">
        <h3 class="font-black text-xl mb-4">Chi tiêu theo tháng</h3>
        <canvas id="monthlyChart"></canvas>
      </div>

      <div class="bg-white rounded-[2rem] md:rounded-[3rem] p-6 md:p-8 shadow-sm border border-slate-100">
        <h3 class="font-black text-xl mb-4">Theo danh mục</h3>
        <canvas id="categoryChart"></canvas>
      </div>
    </section>

    <section class="bg-white rounded-[2rem] md:rounded-[3rem] p-6 md:p-8 shadow-sm border border-slate-100">
      <h3 class="font-black text-xl mb-5">Lịch sử giao dịch</h3>
      <div id="historyList"></div>
    </section>
  </div>

  <script type="module" src="/js/stats.js"></script>
</body>
</html>
