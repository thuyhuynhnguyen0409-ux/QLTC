<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
/>

<title>
Finance AI Login
</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-950 min-h-screen flex items-center justify-center p-5">

<div class="bg-slate-900 w-full max-w-md p-8 rounded-[30px] shadow-2xl border border-slate-800">

<div class="text-center mb-8">

<div class="text-6xl mb-4">
💸
</div>

<h1 class="text-5xl font-black text-white">
Finance AI
</h1>

<p class="text-slate-400 mt-3">
Nhập email để nhận link đăng nhập
</p>

</div>

<div class="space-y-4">

<div>

<label class="text-sm text-slate-300 font-bold">
Email
</label>

<input
    id="email"
    type="email"
    placeholder="you@gmail.com"
    class="w-full mt-2 p-4 rounded-2xl bg-slate-800 border border-slate-700 text-white outline-none"
/>

</div>

<button
    id="loginBtn"
    class="w-full bg-indigo-500 hover:bg-indigo-600 transition text-white font-black p-4 rounded-2xl text-lg"
>

Gửi link đăng nhập

</button>

</div>

<p class="text-center text-slate-500 text-sm mt-8">
Secure login powered by Supabase
</p>

</div>

<script type="module">
    // Đảm bảo đường dẫn này khớp với cấu trúc thư mục của bạn
    import { loginWithEmail } from './js/auth.js'

    // Đợi DOM sẵn sàng để tránh lỗi "không tìm thấy element"
    document.addEventListener('DOMContentLoaded', () => {
        const loginBtn = document.getElementById('loginBtn');
        const emailInput = document.getElementById('email');

        if (loginBtn) {
            loginBtn.addEventListener('click', async (e) => {
                // Ngăn chặn hành vi mặc định nếu có
                e.preventDefault();

                const email = emailInput.value.trim();

                if (!email) {
                    alert('Vui lòng nhập email');
                    return;
                }

                // Hiệu ứng loading cho nút bấm
                loginBtn.disabled = true;
                loginBtn.innerHTML = `
                    <svg class="animate-spin h-5 w-5 mr-3 inline-block" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg> Đang gửi...`;

                try {
                    await loginWithEmail(email);
                } catch (err) {
                    console.error("Lỗi hệ thống:", err);
                    alert("Có lỗi xảy ra, vui lòng thử lại.");
                } finally {
                    loginBtn.disabled = false;
                    loginBtn.innerText = 'Gửi link đăng nhập';
                }
            });
        }
    });
</script>

</body>
</html>
