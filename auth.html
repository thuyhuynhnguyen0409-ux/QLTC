
<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8" />

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
/>

<title>
Finance AI Login
</title>

<script src="https://cdn.tailwindcss.com"></script>

<link
    rel="preconnect"
    href="https://fonts.googleapis.com"
/>

<link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
/>

<link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap"
    rel="stylesheet"
/>

<style>

body {

    font-family: 'Inter', sans-serif;
}

</style>

</head>

<body class="bg-slate-100 min-h-screen flex items-center justify-center p-5">

<div class="w-full max-w-md">

    <!-- CARD -->

    <div class="bg-white rounded-[32px] p-8 shadow-sm">

        <!-- LOGO -->

        <div class="mb-8 text-center">

            <div class="text-6xl mb-3">
                💸
            </div>

            <h1 class="text-4xl font-black text-slate-800">
                Finance AI
            </h1>

            <p class="text-slate-500 mt-3 leading-relaxed">

                Nhập email để nhận
                link đăng nhập từ Supabase

            </p>

        </div>

        <!-- EMAIL -->

        <div class="mb-5">

            <label class="text-sm font-bold text-slate-700 block mb-2">

                Email

            </label>

            <input
                id="email"
                type="email"
                placeholder="example@gmail.com"
                class="w-full p-4 rounded-2xl border border-slate-200 outline-none focus:border-indigo-500"
            />

        </div>

        <!-- BUTTON -->

        <button
            id="loginBtn"
            class="w-full bg-indigo-500 hover:bg-indigo-600 transition text-white font-bold p-4 rounded-2xl"
        >

            Gửi link đăng nhập

        </button>

        <!-- MESSAGE -->

        <div
            id="message"
            class="hidden mt-5 bg-emerald-50 border border-emerald-200 text-emerald-700 p-4 rounded-2xl text-sm leading-relaxed"
        ></div>

    </div>

    <!-- FOOTER -->

    <p class="text-center text-sm text-slate-400 mt-5">

        Secure login powered by Supabase

    </p>

</div>

<script type="module">

import {
    loginWithEmail
}
from './js/auth.js'

const btn =
    document.getElementById(
        'loginBtn'
    )

btn.addEventListener(
    'click',
    async () => {

        console.log('CLICK')

        const email =
            document
            .getElementById('email')
            .value
            .trim()

        if (!email) {

            alert('Nhập email')

            return
        }

        btn.disabled = true

        btn.innerText =
            'Đang gửi...'

        const success =
            await loginWithEmail(email)

        btn.disabled = false

        btn.innerText =
            'Gửi link đăng nhập'

        if (success) {

            alert(
                'Đã gửi email đăng nhập.\nHãy kiểm tra hộp thư.'
            )
        }
    }
)

</script>

</body>
</html>
