<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
/>

<title>
Đăng nhập
</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-100 flex items-center justify-center min-h-screen">

<div class="bg-white p-8 rounded-3xl w-full max-w-sm">

<h1 class="text-3xl font-black mb-6">
Đăng nhập
</h1>

<button
    id="googleBtn"
    class="w-full bg-black text-white p-4 rounded-2xl"
>
Đăng nhập Google
</button>

</div>

<script type="module">

import { createClient }
from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase =
    createClient(
        'YOUR_SUPABASE_URL',
        'YOUR_SUPABASE_ANON_KEY'
    )

document
.getElementById('googleBtn')
.addEventListener('click', async () => {

    await supabase.auth.signInWithOAuth({

        provider: 'google',

        options: {

            redirectTo:
                window.location.origin
                + '/index.html'
        }
    })
})

</script>

</body>
</html>
