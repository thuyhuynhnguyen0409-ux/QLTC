<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập Hệ Thống</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Tích hợp Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            transition: transform 0.3s ease;
        }
        .login-card:hover {
            transform: translateY(-5px);
        }
        .btn-social {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            font-weight: 600;
            transition: all 0.2s;
            margin-bottom: 1rem;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .btn-email {
            background-color: #f3f4f6;
            color: #1f2937;
        }
        .btn-email:hover {
            background-color: #e5e7eb;
            border-color: #d1d5db;
        }
        .btn-facebook {
            background-color: #1877f2;
            color: white;
        }
        .btn-facebook:hover {
            background-color: #166fe5;
            box-shadow: 0 4px 12px rgba(24, 119, 242, 0.3);
        }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: none;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error-msg {
            color: #ef4444;
            font-size: 0.875rem;
            margin-top: 1rem;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-card mx-4">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">Chào mừng</h1>
            <p class="text-gray-500">Vui lòng chọn phương thức đăng nhập</p>
        </div>

        <div id="auth-buttons">
            <button onclick="handleLogin('email')" class="btn-social btn-email">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M0 4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V4Zm2-1a1 1 0 0 0-1 1v.217l7 4.2 7-4.2V4a1 1 0 0 0-1-1H2Zm13 2.383-4.708 2.825L15 11.105V5.383Zm-.034 6.876-5.64-3.471L8 9.583l-1.326-.795-5.64 3.47A1 1 0 0 0 2 13h12a1 1 0 0 0 .966-.741ZM1 11.105l4.708-2.897L1 5.383v5.722Z"/>
                </svg>
                <span>Đăng nhập Email (OTP)</span>
            </button>

            <button onclick="handleLogin('facebook')" class="btn-social btn-facebook">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M16 8.049c0-4.446-3.582-8.05-8-8.05C3.58 0-.002 3.603-.002 8.05c0 4.017 2.926 7.347 6.75 7.951v-5.625h-2.03V8.05H6.75V6.275c0-2.017 1.195-3.131 3.022-3.131.876 0 1.791.157 1.791.157v1.98h-1.009c-.993 0-1.303.621-1.303 1.258v1.51h2.218l-.354 2.326H9.25V16c3.824-.604 6.75-3.934 6.75-7.951z"/>
                </svg>
                <span>Tiếp tục với Facebook</span>
            </button>
        </div>

        <div id="status-container" class="hidden flex flex-col items-center mt-4">
            <div class="loader mb-2" id="loader"></div>
            <p id="status-text" class="text-sm text-gray-600 font-medium"></p>
        </div>

        <div id="error-display" class="error-msg"></div>

        <div class="mt-8 text-center">
            <p class="text-xs text-gray-400">
                Bằng cách đăng nhập, bạn đồng ý với Điều khoản & Chính sách của chúng tôi.
            </p>
        </div>
    </div>

    <script>
        // Cấu hình Supabase
        // LƯU Ý: Thay 'YOUR_SUPABASE_URL' bằng URL thực tế từ Supabase Dashboard của bạn.
// Cấu hình Supabase - Tách biệt thông tin nhạy cảm
// Sử dụng toán tử logic để ưu tiên lấy từ biến môi trường của nền tảng (nếu có)
const SUPABASE_URL = window.ENV_SUPABASE_URL || 'https://mojulicyvkrwoxbjpsem.supabase.co'; 
const SUPABASE_KEY = window.ENV_SUPABASE_KEY || ''; // Để trống để điền trên Vercel

// Khởi tạo client
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function handleLogin(provider) {
            const buttons = document.getElementById('auth-buttons');
            const statusContainer = document.getElementById('status-container');
            const statusText = document.getElementById('status-text');
            const loader = document.getElementById('loader');
            const errorDisplay = document.getElementById('error-display');

            errorDisplay.style.display = 'none';
            buttons.style.display = 'none';
            statusContainer.classList.remove('hidden');
            loader.style.display = 'block';
            statusText.innerText = `Đang kết nối với ${provider}...`;

            try {
                if (provider === 'facebook') {
                    const { data, error } = await supabaseClient.auth.signInWithOAuth({
                        provider: 'facebook',
                        options: {
                            redirectTo: window.location.origin + '/index.html'
                        }
                    });
                    
                    if (error) throw error;
                } else {
                    // Logic Magic Link yêu cầu email người dùng
                    // Ở đây chỉ demo luồng giả định
                    statusText.innerText = "Yêu cầu đã được gửi. Đang kiểm tra phiên làm việc...";
                    
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                }
            } catch (error) {
                console.error('Lỗi đăng nhập:', error.message);
                loader.style.display = 'none';
                statusContainer.classList.add('hidden');
                buttons.style.display = 'block';
                errorDisplay.innerText = "Lỗi: " + error.message;
                errorDisplay.style.display = 'block';
            }
        }

        window.onload = async () => {
            try {
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (session) {
                    window.location.href = 'index.html';
                }
            } catch (err) {
                console.log("Không có phiên làm việc cũ.");
            }
        };
    </script>
</body>
</html>
