
<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
/>

<title>
Đăng nhập
</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

<div class="bg-white p-6 rounded-3xl w-full max-w-md shadow">

<h1 class="text-3xl font-black mb-6 text-center">
Finance AI
</h1>

<input
    id="email"
    type="email"
    placeholder="Email"
    class="w-full p-4 border rounded-2xl mb-4"
/>

<input
    id="password"
    type="password"
    placeholder="Mật khẩu"
    class="w-full p-4 border rounded-2xl mb-4"
/>

<button
    id="loginBtn"
    class="w-full bg-indigo-500 text-white p-4 rounded-2xl font-bold mb-3"
>
Đăng nhập
</button>

<button
    id="registerBtn"
    class="w-full bg-slate-900 text-white p-4 rounded-2xl font-bold"
>
Đăng ký
</button>

</div>

<script type="module">

import {
    loginWithEmail
} from './js/auth.js'

document
    .getElementById('loginBtn')
    .addEventListener(
        'click',
        async () => {

            const email =
                document
                    .getElementById('email')
                    .value
                    .trim()

            if (!email) {

                alert('Nhập email')
                return
            }

            await loginWithEmail(email)
        }
    )

</script>

</body>
</html>
