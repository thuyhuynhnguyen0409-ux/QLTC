<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finance AI</title>

  <link rel="icon" href="data:," />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="/css/style.css" />
</head>

<body class="bg-slate-50 text-slate-900">

<!-- WRAPPER MOBILE -->
<div class="max-w-md mx-auto px-3 py-4 space-y-5">

  <!-- HEADER -->
  <header class="flex justify-between items-center">
    <h1 class="text-2xl font-black">
      Finance <span class="text-indigo-600">AI</span>
    </h1>

    <button onclick="logout()"
      class="px-3 py-2 rounded-xl bg-rose-500 text-white text-sm font-bold">
      Đăng xuất
    </button>
  </header>

  <!-- DASHBOARD CARD -->
  <section class="bg-white rounded-3xl p-4 shadow-sm">

    <p class="text-xs text-slate-400">Mức chi tiêu hôm nay</p>

    <h2 id="dailyBudget" class="text-3xl font-black text-indigo-600">
      0đ
    </h2>

    <div class="relative w-40 h-40 mx-auto mt-4">
      <canvas id="mainChart"></canvas>

      <div class="absolute inset-0 flex flex-col items-center justify-center text-center pointer-events-none">
        <span class="text-xs text-slate-400">Còn lại</span>
        <b id="chartCenterValue" class="text-lg font-black text-emerald-600">
          0đ
        </b>
      </div>
    </div>

  </section>

  <!-- THÊM CHI TIÊU -->
  <section class="bg-white rounded-3xl p-4 shadow-sm">

    <h3 class="font-black mb-3">Thêm chi tiêu</h3>

    <input id="expName"
      class="w-full p-4 rounded-2xl bg-slate-50 border mb-3"
      placeholder="Tên khoản chi" />

    <input id="expAmount"
      class="w-full p-4 rounded-2xl bg-slate-50 border mb-3"
      placeholder="Số tiền" />

    <select id="expCategory"
      class="w-full p-4 rounded-2xl bg-slate-50 border mb-3">
      <option value="food">Ăn uống</option>
      <option value="transport">Di chuyển</option>
      <option value="shopping">Mua sắm</option>
      <option value="bills">Hóa đơn</option>
      <option value="other">Khác</option>
    </select>

    <input id="billInput" type="file" accept="image/*" capture="environment" class="hidden" />

    <button onclick="document.getElementById('billInput').click()"
      class="w-full p-4 rounded-2xl bg-amber-500 text-white font-black active:scale-95 transition">
      📸 Chụp / tải bill
    </button>

    <button onclick="addExpense()"
      class="w-full mt-3 p-4 rounded-2xl bg-indigo-600 text-white font-black active:scale-95 transition">
      Lưu chi tiêu
    </button>

  </section>

  <!-- AI GỢI Ý -->
  <section class="bg-emerald-600 text-white rounded-3xl p-4">

    <div class="flex justify-between items-center mb-3">
      <h3 class="font-black">AI gợi ý món ăn</h3>
      <span class="text-xs bg-white/20 px-2 py-1 rounded-full">AI</span>
    </div>

    <!-- BOX KẾT QUẢ (FIX SCROLL) -->
    <div
      id="aiChefText"
      class="bg-white text-slate-700 rounded-2xl p-3 text-sm leading-relaxed
             max-h-40 overflow-y-auto"
    >
      Nhập ghi chú và bấm gợi ý...
    </div>

    <textarea id="chefNote"
      class="w-full mt-3 p-3 rounded-2xl bg-emerald-700/30 border border-white/10 outline-none"
      placeholder="Ví dụ: ít dầu mỡ..."
    ></textarea>

    <button id="btnSuggest" onclick="suggestFood()"
      class="w-full mt-3 bg-white text-emerald-700 p-3 rounded-2xl font-black active:scale-95 transition">
      🍚 Gợi ý món ăn
    </button>

  </section>

  <!-- LỊCH SỬ -->
  <section class="bg-white rounded-3xl p-4 shadow-sm">

    <div class="flex justify-between mb-3">
      <h3 class="font-black">Chi tiêu hôm nay</h3>
    </div>

    <div id="expenseList" class="space-y-2"></div>

  </section>

</div>

  <script src="/env.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4.1.1/dist/tesseract.min.js"></script>
  <script type="module" src="/js/app.js"></script>
</body>

</html>
