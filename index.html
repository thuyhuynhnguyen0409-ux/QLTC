<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8" />

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
/>

<title>
Finance AI
</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link
    rel="stylesheet"
    href="./css/style.css"
/>

</head>

<body class="bg-slate-100 min-h-screen">

<div class="max-w-md mx-auto p-4">

    <!-- HEADER -->

    <div class="flex justify-between items-center mb-5">

        <div>

            <h1 class="text-3xl font-black">
                Finance AI
            </h1>

            <p
                id="userEmailDisplay"
                class="text-sm text-slate-500"
            ></p>

        </div>

        <button
            onclick="logout()"
            class="bg-red-500 text-white px-4 py-2 rounded-2xl"
        >
            Logout
        </button>

    </div>

    <!-- DAILY -->

    <div class="bg-white p-5 rounded-3xl shadow-sm">

        <p class="text-slate-500">
            Chi tiêu hôm nay
        </p>

        <h2
            id="dailyBudget"
            class="text-4xl font-black mt-2"
        >
            0đ
        </h2>

        <div class="mt-4">

            <div class="flex justify-between text-sm">

                <span class="text-slate-500">
                    Còn lại chu kỳ
                </span>

                <b id="remainingCycle">
                    0đ
                </b>

            </div>

            <div class="flex justify-between text-sm mt-2">

                <span class="text-slate-500">
                    Tiết kiệm hiện tại
                </span>

                <b id="currentSavings">
                    0đ
                </b>

            </div>

        </div>

    </div>

    <!-- CHART -->

    <div class="bg-white p-5 rounded-3xl mt-5 shadow-sm">

        <canvas id="mainChart"></canvas>

    </div>

    <!-- ADD EXPENSE -->

    <div class="bg-white p-5 rounded-3xl mt-5 shadow-sm">

        <h3 class="font-bold text-lg mb-4">
            Thêm chi tiêu
        </h3>

        <input
            id="expName"
            class="w-full p-3 border rounded-xl mb-3"
            placeholder="Tên khoản chi"
        />

        <input
            id="expAmount"
            class="w-full p-3 border rounded-xl mb-3"
            placeholder="Số tiền"
        />

        <select
            id="expCategory"
            class="w-full p-3 border rounded-xl mb-3"
        >

            <option value="food">
                Ăn uống
            </option>

            <option value="transport">
                Di chuyển
            </option>

            <option value="shopping">
                Mua sắm
            </option>

            <option value="bills">
                Hóa đơn
            </option>

            <option value="other">
                Khác
            </option>

        </select>

        <button
            onclick="addExpense()"
            class="w-full bg-indigo-500 text-white p-4 rounded-2xl font-bold"
        >
            Thêm chi tiêu
        </button>

    </div>

    <!-- EXPENSE LIST -->

    <div class="bg-white p-5 rounded-3xl mt-5 shadow-sm">

        <div class="flex justify-between items-center mb-4">

            <h3 class="font-bold text-lg">
                Lịch sử chi tiêu
            </h3>

            <a
                href="./stats.html"
                class="text-indigo-500 text-sm font-bold"
            >
                Xem thống kê
            </a>

        </div>

        <div id="expenseList"></div>

    </div>

    <!-- AI -->

    <div class="bg-white p-5 rounded-3xl mt-5 shadow-sm">

        <h3 class="font-bold text-lg mb-3">
            AI gợi ý món ăn
        </h3>

        <textarea
            id="chefNote"
            class="w-full p-3 border rounded-2xl mb-3"
            placeholder="VD: ít dầu mỡ, nhiều protein..."
        ></textarea>

        <button
            id="btnSuggest"
            onclick="suggestFood()"
            class="w-full bg-emerald-500 text-white p-4 rounded-2xl font-bold"
        >
            Gợi ý món ăn
        </button>

        <div
            id="aiChefText"
            class="mt-4 text-sm whitespace-pre-wrap"
        ></div>

    </div>

    <!-- SETTINGS -->

    <div class="mt-5">

        <button
            onclick="toggleConfigModal(true)"
            class="w-full bg-slate-900 text-white p-4 rounded-2xl font-bold"
        >
            Cài đặt tài chính
        </button>

    </div>

</div>

<!-- CONFIG MODAL -->

<div
    id="configModal"
    class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4"
>

<div class="bg-white w-full max-w-md rounded-3xl p-5">

    <div class="flex justify-between items-center mb-5">

        <h2 class="text-2xl font-black">
            Thiết lập
        </h2>

        <button
            onclick="toggleConfigModal(false)"
            class="text-2xl"
        >
            ×
        </button>

    </div>

    <input
        id="salaryInput"
        class="w-full p-3 border rounded-xl mb-3"
        placeholder="Thu nhập tháng"
    />

    <input
        id="savingsInput"
        class="w-full p-3 border rounded-xl mb-3"
        placeholder="Tiết kiệm ban đầu"
    />

    <input
        id="paydayInput"
        type="number"
        class="w-full p-3 border rounded-xl mb-3"
        placeholder="Ngày nhận lương"
    />

    <input
        id="cycleEndInput"
        type="number"
        class="w-full p-3 border rounded-xl mb-3"
        placeholder="Ngày kết thúc chu kỳ"
    />

    <div
        id="fixedCostsList"
        class="mb-3"
    ></div>

    <button
        onclick="addFixedCostRow()"
        class="w-full border-2 border-dashed border-slate-300 p-3 rounded-2xl mb-4"
    >
        + Thêm chi phí cố định
    </button>

    <button
        onclick="initBudget()"
        class="w-full bg-indigo-500 text-white p-4 rounded-2xl font-bold"
    >
        Lưu thiết lập
    </button>

</div>

</div>
<script>
if (
    !localStorage.getItem(
        'supabase.auth.token'
    )
) {
    window.location.href =
        './auth.html'
}
</script>
<script src="/env.js"></script>
<script
    type="module"
    src="/js/app.js"
></script>

</body>
</html>
