<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
/>

<title>
Finance AI
</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link
    rel="stylesheet"
    href="./css/style.css"
/>

</head>

<body class="bg-slate-100">

<div class="max-w-md mx-auto p-4">

<h1 class="text-3xl font-bold mb-4">
Finance AI
</h1>

<div class="bg-white p-5 rounded-3xl">

<p class="text-slate-500">
Chi tiêu hôm nay
</p>

<h2
    id="dailyBudget"
    class="text-4xl font-black"
>
0đ
</h2>

</div>

<div class="mt-5 bg-white p-5 rounded-3xl">

<input
    id="expName"
    class="w-full p-3 border rounded-xl mb-3"
    placeholder="Tên khoản chi"
/>

<input
    id="expAmount"
    class="w-full p-3 border rounded-xl mb-3"
    placeholder="Số tiền"
/>

<select
    id="expCategory"
    class="w-full p-3 border rounded-xl mb-3"
>

<option value="food">
Ăn uống
</option>

<option value="transport">
Di chuyển
</option>

</select>

<button
    onclick="addExpense()"
    class="w-full bg-indigo-500 text-white p-4 rounded-2xl"
>
Thêm chi tiêu
</button>

</div>

<canvas
    id="mainChart"
    class="mt-5"
></canvas>

</div>

<script
    type="module"
    src="./js/app.js"
></script>

</body>
</html>
